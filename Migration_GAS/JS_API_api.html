<script>
/**
 * AttendQR — Capa de comunicación con el backend GAS
 *
 * Todas las llamadas al servidor pasan por _call(), que envuelve
 * google.script.run en una Promise con el contrato { success, message, data }.
 *
 * El token de sesión se almacena en sessionStorage y se inyecta
 * automáticamente como último argumento en cada función autenticada.
 */
const Api = (() => {

  const TOKEN_KEY = 'attendqr_token';

  function getToken() {
    return sessionStorage.getItem(TOKEN_KEY) || null;
  }

  function setToken(t) {
    if (t) sessionStorage.setItem(TOKEN_KEY, t);
    else   sessionStorage.removeItem(TOKEN_KEY);
  }

  /**
   * Wrapper Promise sobre google.script.run.
   * fnName: nombre exacto de la función global en el proyecto GAS.
   * args:   argumentos posicionales que recibe esa función.
   */
  function _call(fnName) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject) {
      var runner = google.script.run
        .withSuccessHandler(function(res) {
          if (!res || res.success === false) {
            var e = new Error(res ? (res.message || 'Error desconocido') : 'Sin respuesta del servidor');
            e.status = 400;
            e.data   = res ? (res.data || null) : null;
            reject(e);
          } else {
            resolve(res.data !== undefined ? res.data : null);
          }
        })
        .withFailureHandler(function(err) {
          var e = new Error(err && err.message ? err.message : 'Error interno del servidor');
          e.status = 500;
          reject(e);
        });

      runner[fnName].apply(runner, args);
    });
  }

  // ── Auth ───────────────────────────────────────────────────────
  var auth = {
    // payload: { correo?, documento?, password }
    // Devuelve: { usuario, token }
    login: function(payload) {
      return _call('authLogin', payload);
    },
    logout: function() {
      return _call('authLogout', getToken());
    },
    verificar: function() {
      return _call('authVerificar', getToken());
    },
    verificarDocumento: function(doc) {
      return _call('authVerificarDocumento', { documento: doc });
    },
    activarCuenta: function(payload) {
      return _call('authActivarCuenta', payload);
    },
  };

  // ── Docentes ───────────────────────────────────────────────────
  var docentes = {
    listar:     function(filtros)    { return _call('docenteListar',     filtros || {}, getToken()); },
    consultar:  function(id)         { return _call('docenteConsultar',  id, getToken()); },
    registrar:  function(payload)    { return _call('docenteRegistrar',  payload, getToken()); },
    actualizar: function(id, datos)  { return _call('docenteActualizar', id, datos, getToken()); },
    eliminar:   function(id)         { return _call('docenteEliminar',   id, getToken()); },
  };

  // ── Aprendices ─────────────────────────────────────────────────
  var aprendices = {
    listar:     function(filtros)    { return _call('aprendizListar',     filtros || {}, getToken()); },
    consultar:  function(id)         { return _call('aprendizConsultar',  id, getToken()); },
    actualizar: function(id, datos)  { return _call('aprendizActualizar', id, datos, getToken()); },
    activar:    function(id)         { return _call('aprendizActualizar', id, { activo: 1 }, getToken()); },
    desactivar: function(id)         { return _call('aprendizActualizar', id, { activo: 0 }, getToken()); },
    importar:   function(datos)      { return _call('aprendizImportar',   datos, getToken()); },
  };

  // ── Fichas ─────────────────────────────────────────────────────
  var fichas = {
    listar:     function(filtros)        { return _call('fichaListar',     filtros || {}, getToken()); },
    consultar:  function(id)             { return _call('fichaConsultar',  id, getToken()); },
    historial:  function(id)             { return _call('fichaHistorial',  id, getToken()); },
    crear:      function(payload)        { return _call('fichaCrear',      payload, getToken()); },
    actualizar: function(id, datos)      { return _call('fichaActualizar', id, datos, getToken()); },
    eliminar:   function(id)             { return _call('fichaEliminar',   id, getToken()); },
  };

  // ── Jornadas ───────────────────────────────────────────────────
  var jornadas = {
    listar: function() { return _call('jornadaListar', getToken()); },
  };

  // ── Trimestres ─────────────────────────────────────────────────
  var trimestres = {
    listar: function(filtros) { return _call('trimestreListar', filtros || {}, getToken()); },
  };

  // ── Sesiones ───────────────────────────────────────────────────
  var sesiones = {
    crear:        function(payload)    { return _call('sesionCrear',        payload, getToken()); },
    listar:       function(filtros)    { return _call('sesionListar',       filtros || {}, getToken()); },
    detalle:      function(id)         { return _call('sesionDetalle',      id, getToken()); },
    activa:       function(idFicha)    { return _call('sesionActiva',       idFicha, getToken()); },
    cerrar:       function(id)         { return _call('sesionCerrar',       id, getToken()); },
    asistencias:  function(id)         { return _call('sesionAsistencias',  id, getToken()); },
    estadisticas: function(id)         { return _call('sesionEstadisticas', id, getToken()); },
  };

  // ── QR ─────────────────────────────────────────────────────────
  var qr = {
    generar:     function(idSesion) { return _call('qrGenerar',     idSesion, getToken()); },
    tokenActivo: function(idSesion) { return _call('qrTokenActivo', idSesion, getToken()); },
    validar:     function(token)    { return _call('qrValidar',     { token: token }, getToken()); },
  };

  // ── Asistencias ────────────────────────────────────────────────
  var asistencias = {
    historial:    function(idAprendiz) { return _call('asistenciaHistorial',     idAprendiz, getToken()); },
    registrar:    function(payload)    { return _call('asistenciaRegistrarQr',   payload, getToken()); },
    cambiarEstado:function(id, datos)  { return _call('asistenciaCambiarEstado', id, datos, getToken()); },
    exportar:     function(filtros)    { return _call('asistenciaExportar',      filtros || {}, getToken()); },
  };

  // ── Estadísticas ───────────────────────────────────────────────
  var estadisticas = {
    resumen:    function()         { return _call('estadisticaResumen',    getToken()); },
    dashboard:  function(filtros)  { return _call('estadisticaDashboard',  filtros || {}, getToken()); },
    asistencia: function(filtros)  { return _call('estadisticaAsistencia', filtros || {}, getToken()); },
    consultar:  function(id, tipo) { return _call('estadisticaConsultar',  id, tipo, getToken()); },
  };

  return {
    auth, docentes, aprendices, fichas, jornadas, trimestres,
    sesiones, qr, asistencias, estadisticas,
    getToken, setToken,
  };

})();
</script>
