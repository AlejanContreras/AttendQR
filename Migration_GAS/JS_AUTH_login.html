<script>
/**
 * AttendQR — Login
 *
 * Gestiona el formulario de inicio de sesión para instructores y aprendices.
 * Llama a authLogin() en el backend vía google.script.run (a través de Api).
 *
 * Flujo:
 *   1. Al cargar: si hay token en sessionStorage, verifica con el backend
 *      y redirige al dashboard si la sesión sigue activa.
 *   2. Al enviar: valida campos, llama a Api.auth.login(), guarda usuario
 *      y token, redirige al dashboard según el rol.
 *   3. En error: muestra mensaje inline dentro del formulario.
 */
document.addEventListener('DOMContentLoaded', function() {

  // Si ya hay token, verificar si la sesión sigue activa y redirigir
  var tokenGuardado = Api.getToken();
  if (tokenGuardado) {
    Api.auth.verificar()
      .then(function(usuario) {
        if (usuario && usuario.rol) {
          auth.setUsuario(usuario);
          auth.irADashboard(usuario.rol);
        }
      })
      .catch(function() {
        auth.clearUsuario();
      });
  }

  // Filtro numérico estricto para el campo de documento del aprendiz
  var docInput = document.getElementById('documentoAprendiz');
  if (docInput) {
    docInput.addEventListener('keydown', function(e) {
      var permitidas = ['Backspace','Delete','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Tab','Enter','Home','End'];
      if (permitidas.indexOf(e.key) >= 0) return;
      if (e.ctrlKey || e.metaKey) return;
      if (!/^\d$/.test(e.key)) e.preventDefault();
    });
    docInput.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '');
    });
  }

  // Focus al primer campo del formulario docente (tab activa por defecto)
  var primerCampo = document.querySelector('#formDocente input:not([type=hidden])');
  if (primerCampo) primerCampo.focus();

});

// ─── Cambio de pestaña Instructor / Aprendiz ──────────────────────────────

function switchRole(tab, role) {
  // Activar la pestaña seleccionada
  document.querySelectorAll('.login-tab').forEach(function(t) {
    t.classList.remove('is-active');
  });
  tab.classList.add('is-active');

  // Mostrar/ocultar el panel completo (header + form)
  var panelDocente  = document.getElementById('formPanelDocente');
  var panelAprendiz = document.getElementById('formPanelAprendiz');
  if (panelDocente)  panelDocente.style.display  = role === 'docente'  ? '' : 'none';
  if (panelAprendiz) panelAprendiz.style.display = role === 'aprendiz' ? '' : 'none';

  // Limpiar campos y alertas del formulario anterior
  document.querySelectorAll('#formDocente input, #formAprendiz input').forEach(function(el) {
    el.value = '';
  });
  document.querySelectorAll('.login-alert').forEach(function(el) { el.remove(); });

  // Focus al primer campo del formulario activado
  setTimeout(function() {
    var formId = role === 'docente' ? 'formDocente' : 'formAprendiz';
    var form   = document.getElementById(formId);
    var input  = form ? form.querySelector('input:not([type=hidden])') : null;
    if (input) input.focus();
  }, 50);
}

// ─── Submit ────────────────────────────────────────────────────────────────

async function handleLogin(e, role) {
  e.preventDefault();
  ocultarError(e.target);

  // Leer credenciales según el rol usando los IDs correctos del HTML
  var body = role === 'docente'
    ? {
        correo:   (document.getElementById('emailDocente')    || {}).value || '',
        password: (document.getElementById('passwordDocente') || {}).value || '',
      }
    : {
        documento: (document.getElementById('documentoAprendiz') || {}).value || '',
        password:  (document.getElementById('passwordAprendiz')  || {}).value || '',
      };

  // Eliminar espacios y validar campos vacíos
  if (role === 'docente') body.correo   = body.correo.trim();
  else                    body.documento = body.documento.trim();

  if (role === 'docente' && !body.correo) {
    mostrarError(e.target, 'El correo electrónico es obligatorio.');
    document.getElementById('emailDocente')?.focus();
    return;
  }
  if (role === 'aprendiz' && !body.documento) {
    mostrarError(e.target, 'El número de documento es obligatorio.');
    document.getElementById('documentoAprendiz')?.focus();
    return;
  }
  if (!body.password) {
    mostrarError(e.target, 'La contraseña es obligatoria.');
    var passId = role === 'docente' ? 'passwordDocente' : 'passwordAprendiz';
    document.getElementById(passId)?.focus();
    return;
  }

  // Estado de carga en el botón
  var btn      = e.target.querySelector('button[type=submit]');
  var original = btn.innerHTML;
  btn.disabled  = true;
  btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-color:rgba(255,255,255,.3);border-top-color:#fff;display:inline-block"></div> Verificando...';

  try {
    // authLogin devuelve { usuario: {...}, token: '...' }
    var data = await Api.auth.login(body);

    Api.setToken(data.token);
    auth.setUsuario(data.usuario);
    auth.irADashboard(data.usuario.rol || role);

  } catch (err) {
    btn.disabled  = false;
    btn.innerHTML = original;
    var msg = err.message || 'No se pudo conectar con el servidor.';
    mostrarError(e.target, msg);
  }
}

// ─── Toggle de visibilidad de contraseña ──────────────────────────────────

function togglePassword(inputId, btn) {
  var input = document.getElementById(inputId);
  if (!input) return;
  input.type = input.type === 'password' ? 'text' : 'password';
}

// ─── Helpers de alerta inline ──────────────────────────────────────────────

function mostrarError(form, mensaje) {
  var alertEl = form.querySelector('.login-alert');
  if (!alertEl) {
    alertEl = document.createElement('div');
    alertEl.className = 'alert alert-danger login-alert';
    alertEl.style.cssText = 'margin-bottom:var(--sp-4);border-radius:var(--r-md)';
    form.prepend(alertEl);
  }
  alertEl.textContent = mensaje;
  alertEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function ocultarError(form) {
  var alertEl = form.querySelector('.login-alert');
  if (alertEl) alertEl.remove();
}
</script>
