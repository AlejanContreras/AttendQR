<style>
/* ============================================================
   AttendQR — Historial Page Styles
   ============================================================ */

/* ─── Filter Bar ─────────────────────────────────────────── */

.filter-bar {
  background: var(--surface);
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: var(--sp-5) var(--sp-6);
  margin-bottom: var(--sp-5);
}

.filter-bar__row {
  display: flex;
  align-items: flex-end;
  gap: var(--sp-4);
  flex-wrap: wrap;
}

.filter-bar__group {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
  flex: 1;
  min-width: 160px;
}

.filter-bar__label {
  font-size: var(--text-xs);
  font-weight: var(--fw-semibold);
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-muted);
}

.filter-bar__actions {
  display: flex;
  gap: var(--sp-2);
  align-items: flex-end;
  flex-shrink: 0;
}

/* ─── Summary Cards ──────────────────────────────────────── */

.historial-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: var(--sp-4);
  margin-bottom: var(--sp-5);
}

.summary-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  padding: var(--sp-4) var(--sp-5);
  text-align: center;
  box-shadow: var(--shadow-sm);
}

.summary-card__num {
  font-size: var(--text-2xl);
  font-weight: var(--fw-bold);
  color: var(--text-primary);
  line-height: 1.1;
}

.summary-card__label {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-top: var(--sp-1);
}

.summary-card--present .summary-card__num  { color: var(--success-text);  }
.summary-card--retard .summary-card__num   { color: var(--warning-text);  }
.summary-card--absent .summary-card__num   { color: var(--danger-text);   }
.summary-card--sessions .summary-card__num { color: var(--info-text);     }
.summary-card--pct .summary-card__num      { color: var(--green-dark);    }

/* ─── Session Expandable Row ─────────────────────────────── */

.session-expand-toggle {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  cursor: pointer;
  font-size: var(--text-sm);
}

.session-expand-toggle__icon {
  width: 18px;
  height: 18px;
  color: var(--text-muted);
  transition: transform var(--t-fast);
}

.session-expand-toggle.is-open .session-expand-toggle__icon {
  transform: rotate(90deg);
}

.session-detail-row {
  display: none;
}

.session-detail-row.is-open {
  display: table-row;
}

.session-detail-row td {
  padding: 0 !important;
  border-bottom: 1px solid var(--border) !important;
}

.session-detail-inner {
  padding: var(--sp-4) var(--sp-5);
  background: var(--surface-2);
}

/* Attendance mini-table inside expanded row */
.mini-table {
  width: 100%;
  font-size: var(--text-xs);
}

.mini-table th {
  padding: var(--sp-2) var(--sp-3);
  font-weight: var(--fw-semibold);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  background: var(--border);
  text-align: left;
}

.mini-table td {
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
}

/* ─── Percentage bar in table ────────────────────────────── */

.pct-cell {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  min-width: 120px;
}

.pct-cell__bar {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: var(--r-full);
  overflow: hidden;
}

.pct-cell__fill {
  height: 100%;
  border-radius: var(--r-full);
  background: var(--green-primary);
}

.pct-cell__fill--warning { background: var(--warning); }
.pct-cell__fill--danger  { background: var(--danger);  }

.pct-cell__num {
  font-size: var(--text-xs);
  font-weight: var(--fw-semibold);
  color: var(--text-secondary);
  min-width: 36px;
  text-align: right;
}

/* ─── Export button area ─────────────────────────────────── */

.historial-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-4);
  flex-wrap: wrap;
  gap: var(--sp-3);
}

.historial-results-count {
  font-size: var(--text-sm);
  color: var(--text-muted);
}

.historial-results-count strong {
  color: var(--text-primary);
  font-weight: var(--fw-semibold);
}

</style>
