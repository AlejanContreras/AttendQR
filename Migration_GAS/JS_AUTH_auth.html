<script>
/**
 * AttendQR — Módulo de autenticación (GAS)
 *
 * Responsabilidades:
 *   - Cache del usuario autenticado en sessionStorage
 *   - Verificación de sesión activa con el backend (vía token)
 *   - Logout con limpieza de estado local y token
 *   - Navegación entre páginas del Web App (?page=...)
 *   - Guard requerirAuth(): redirige a login si no hay sesión válida
 *
 * En GAS no existe sesión PHP ni window.location.pathname con rutas.
 * La navegación usa parámetros ?page= del Web App.
 * El token se obtiene de Api.getToken() y se pasa al backend en cada llamada.
 */
const auth = (() => {

  const STORAGE_KEY = 'attendqr_usuario';

  // ─── Estado local ──────────────────────────────────────────────

  function setUsuario(u) {
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(u));
  }

  function getUsuario() {
    try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY) || 'null'); }
    catch(e) { return null; }
  }

  function clearUsuario() {
    sessionStorage.removeItem(STORAGE_KEY);
    Api.setToken(null);
  }

  function getRol() {
    var u = getUsuario();
    return u ? (u.rol || null) : null;
  }

  function getId() {
    var u = getUsuario();
    return u ? (u.id || null) : null;
  }

  // ─── Navegación (GAS Web App usa ?page=) ───────────────────────
  // GAS_BASE_URL definida en JS_UTIL_Navegacion.html (URL fija del deploy).

  function _ir(page) {
    window.top.location.href = GAS_BASE_URL + '?page=' + page;
  }

  function irALogin() { _ir('login'); }

  function irADashboard(rol) {
    _ir(rol === 'aprendiz' ? 'dashboard-aprendiz' : 'dashboard-docente');
  }

  // ─── Verificar sesión con el backend ──────────────────────────

  /**
   * Llama a authVerificar(token) en el backend.
   * - Si el token es válido: actualiza cache y retorna el usuario.
   * - Si no:                 limpia cache y lanza error.
   */
  function verificar() {
    return Api.auth.verificar()
      .then(function(usuario) {
        if (usuario && usuario.id) {
          setUsuario(usuario);
          return usuario;
        }
        throw new Error('Sesión inválida');
      })
      .catch(function(e) {
        clearUsuario();
        throw e;
      });
  }

  /**
   * Guard de ruta para páginas protegidas.
   * Llama desde DOMContentLoaded de cada página que requiera auth.
   * Redirige a login si no hay token o si el token ya expiró.
   * Retorna Promise<usuario> si la sesión es válida.
   */
  function requerirAuth() {
    var token = Api.getToken();
    if (!token) {
      irALogin();
      return Promise.reject(new Error('Sin sesión'));
    }
    return verificar().catch(function() {
      irALogin();
      return null;
    });
  }

  // ─── Logout ────────────────────────────────────────────────────

  function logout() {
    return Api.auth.logout()
      .catch(function() { /* continúa aunque falle el backend */ })
      .then(function() {
        clearUsuario();
        irALogin();
      });
  }

  return {
    setUsuario, getUsuario, clearUsuario, getRol, getId,
    verificar, requerirAuth, logout, irALogin, irADashboard,
  };

})();

// Poblar window.ATTENDQR_USER síncronamente al evaluar el módulo,
// antes de cualquier DOMContentLoaded, para evitar condición de carrera
// en módulos de página que leen este global al momento de su evaluación.
window.ATTENDQR_USER = auth.getUsuario();
</script>
