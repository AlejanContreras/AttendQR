    <div class="page-header">
      <div>
        <h1 class="page-header__title">Historial de Asistencia</h1>
        <p class="page-header__sub">Registro completo de sesiones y asistencia por ficha</p>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="historial.exportar()" id="btnExportar">

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-bar__row">
        <div class="filter-bar__group">
          <label class="filter-bar__label">Ficha</label>
          <select class="form-control" id="filterFicha">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="filter-bar__group">
          <label class="filter-bar__label">Estado</label>
          <select class="form-control" id="filterEstado">
            <option value="">Todos</option>
            <option value="abierta">Abierta</option>
            <option value="cerrada">Cerrada</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </div>
        <div class="filter-bar__group">
          <label class="filter-bar__label">Desde</label>
          <input type="date" class="form-control" id="filterDesde">
        </div>
        <div class="filter-bar__group">
          <label class="filter-bar__label">Hasta</label>
          <input type="date" class="form-control" id="filterHasta">
        </div>
        <div class="filter-bar__actions">
          <button class="btn btn-primary btn-sm" onclick="historial.filtrar()">Filtrar</button>
          <button class="btn btn-ghost btn-sm"   onclick="historial.limpiar()">Limpiar</button>
        </div>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="historial-summary">
      <div class="summary-card summary-card--sessions">
        <div class="summary-card__num" id="sumTotal">—</div>
        <div class="summary-card__label">Total sesiones</div>
      </div>
      <div class="summary-card summary-card--sessions">
        <div class="summary-card__num" id="sumCerradas" style="color:var(--text-secondary)">—</div>
        <div class="summary-card__label">Cerradas</div>
      </div>
      <div class="summary-card summary-card--present">
        <div class="summary-card__num" id="sumAbiertas">—</div>
        <div class="summary-card__label">Abiertas</div>
      </div>
      <div class="summary-card summary-card--absent">
        <div class="summary-card__num" id="sumCanceladas">—</div>
        <div class="summary-card__label">Canceladas</div>
      </div>
      <div class="summary-card summary-card--pct">
        <div class="summary-card__num" id="sumPct">—</div>
        <div class="summary-card__label">Asistencia media</div>
      </div>
    </div>

    <!-- Sessions Table -->
    <div class="card">
      <div class="card-header">
        <div>
          <h3 class="card-title">Sesiones</h3>
          <p class="card-subtitle" id="historialSubtitle">Cargando...</p>
        </div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-wrapper">
          <table class="table table--hover">
            <thead>
              <tr>
                <th style="width:40px"></th>
                <th>Ficha / Programa</th>
                <th>Fecha</th>
                <th>Apertura</th>
                <th>Cierre</th>
                <th>Estado</th>
                <th>Pres.</th>
                <th>Tard.</th>
                <th>Aus.</th>
                <th title="Excusas">Exc.</th>
                <th>Asistencia</th>
              </tr>
            </thead>
            <tbody id="historialBody">
              <tr>
                <td colspan="11" style="text-align:center;padding:var(--sp-10)">
                  <div class="spinner" style="margin:0 auto"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="card-footer">
        <span style="font-size:var(--text-sm);color:var(--text-muted)" id="historialPaginaInfo"></span>
        <div style="display:flex;gap:var(--sp-2)" id="historialPaginacion"></div>
      </div>
    </div>

  </main>

<script>
window.ATTENDQR_VIEW = 'historial';
(function () {
  var u = auth.getUsuario();
  if (!u) { auth.irALogin(); return; }
  window.ATTENDQR_USER = u;
  var nombre    = u.nombre || u.nombres || '';
  var iniciales = nombre.split(' ').slice(0, 2).map(function (p) { return (p[0] || '').toUpperCase(); }).join('');
  document.querySelectorAll('[data-usuario-nombre]').forEach(function (el) { el.textContent = nombre; });
  document.querySelectorAll('[data-usuario-iniciales]').forEach(function (el) { el.textContent = iniciales; });
  document.querySelectorAll('[data-usuario-rol]').forEach(function (el) { el.textContent = u.rol || ''; });
  var navDoc = document.getElementById('navDocente');
  var navApr = document.getElementById('navAprendiz');
  if (navDoc) navDoc.style.display = u.rol === 'docente'  ? '' : 'none';
  if (navApr) navApr.style.display = u.rol === 'aprendiz' ? '' : 'none';
  auth.requerirAuth().then(function (usuario) { if (usuario) window.ATTENDQR_USER = usuario; });
})();
</script>
